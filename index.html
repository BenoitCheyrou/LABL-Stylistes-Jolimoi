<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>LabL — Espace Stylistes</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500&display=swap" rel="stylesheet">
<style>
/* =============================================
   EXACT MATCH TO loveandbeloved.fr
   ============================================= */
:root {
  --text: #333;
  --text-light: #666;
  --text-muted: #999;
  --bg: #fff;
  --bg-light: #f7f7f7;
  --bg-dark: #333;
  --border: #e0e0e0;
  --teal: #5b9a9a;
  --teal-dark: #4a8585;
  --tab-h: 58px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
input, button, textarea, select { font-family: 'Raleway', sans-serif; }

body {
  font-family: 'Raleway', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  line-height: 1.7;
  font-size: 15px;
  padding-bottom: calc(var(--tab-h) + 16px);
}

/* ---- TAB BAR ---- */
.tab-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--tab-h);
  background: #1a1a1a;
  display: flex;
  z-index: 200;
  box-shadow: 0 -1px 8px rgba(0,0,0,.15);
  padding-bottom: env(safe-area-inset-bottom);
}
.tab {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  color: rgba(255,255,255,.4); cursor: pointer;
  border: none; background: none; font-family: inherit;
  -webkit-tap-highlight-color: transparent; transition: color .2s;
}
.tab.active { color: #fff; }
.tab svg { width: 20px; height: 20px; fill: currentColor; }
.tab span { font-size: 9px; letter-spacing: .5px; font-weight: 600; text-transform: uppercase; font-family: 'Raleway', sans-serif; }

/* ---- HEADER ---- */
.app-hdr {
  background: #fff; text-align: center;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.app-hdr img { height: 40px; }
.app-hdr-text { font-size: 9px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

/* ---- PAGES ---- */
.page { display: none; }
.page.active { display: block; }

/* ============================================= */
/* PRODUCT LIST                                  */
/* ============================================= */
.plist { padding: 30px 20px; max-width: 900px; margin: 0 auto; }
.plist-title { font-size: 24px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; text-align: center; margin-bottom: 24px; }
.pgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.pcard { cursor: pointer; transition: opacity .2s; }
.pcard:hover { opacity: .85; }
.pcard img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; border: 1px solid #f0f0f0; }
.pcard-name { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: .3px; margin-top: 10px; line-height: 1.4; }
.pcard-sub { font-size: 12px; color: var(--text-light); margin-top: 2px; }
.pcard-soon { opacity: .35; pointer-events: none; }
.pcard-ph { width:100%; aspect-ratio:1; background:#f5f5f5; display:flex; align-items:center; justify-content:center; font-size:32px; color:#ddd; border:1px solid #f0f0f0; }

/* ============================================= */
/* PRODUCT DETAIL — faithful to site             */
/* ============================================= */
.pd-back {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 14px 20px; font-size: 13px; color: var(--text-muted);
  cursor: pointer; border: none; background: none; font-family: inherit;
}
.pd-back:hover { color: var(--teal); }

/* -- Hero: image left + info right -- */
.pd-hero {
  display: flex; gap: 30px;
  max-width: 1100px; margin: 0 auto;
  padding: 0 20px 30px;
}
.pd-gallery { flex: 0 0 55%; position: relative; }
.pd-gallery-wrap { display: flex; gap: 10px; }
.pd-thumbs-col { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; width: 70px; }
.pd-thumb {
  width: 70px; height: 70px; object-fit: cover; cursor: pointer;
  border: 1px solid transparent; opacity: .5; transition: all .2s;
}
.pd-thumb.active { border-color: var(--border); opacity: 1; }
.pd-main-wrap { flex: 1; overflow: hidden; }
.pd-main-img { width: 100%; display: block; }

.pd-info-col { flex: 1; }
.pd-title {
  font-size: 28px; font-weight: 800; text-transform: uppercase;
  letter-spacing: 1px; line-height: 1.25; color: var(--text);
}
.pd-subtitle { font-size: 14px; color: var(--text-light); margin-top: 4px; }
.pd-tagline { font-size: 17px; color: var(--text); margin-top: 14px; line-height: 1.5; }

/* Benefits */
.pd-benefits { margin-top: 20px; }
.pd-benefits-group { margin-bottom: 14px; }
.pd-benefits-group h4 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.pd-benefits-group li {
  list-style: none; font-size: 14px; line-height: 1.8;
  padding-left: 14px; position: relative;
}
.pd-benefits-group li::before { content: '•'; position: absolute; left: 0; }

.pd-ing-line { font-size: 14px; margin-top: 10px; line-height: 1.6; }
.pd-ing-line strong, .pd-aromes strong { font-weight: 700; }
.pd-aromes { font-size: 14px; margin-top: 2px; }
.pd-format { font-size: 15px; margin-top: 10px; }

/* Badges row */
.pd-badges { display: flex; gap: 20px; margin-top: 16px; flex-wrap: wrap; align-items: center; }
.pd-badge { text-align: center; }
.pd-badge img { width: 60px; height: 60px; display: block; margin: 0 auto 4px; }
.pd-badge span { font-size: 9px; text-transform: uppercase; letter-spacing: .5px; font-weight: 700; color: var(--text); display: block; line-height: 1.3; }

/* -- Editorial section — exact match to site code -- */
.pd-editorial-section {
  background-color: #e7faff;
  width: 100%;
  padding: 60px 20px;
  margin: 0 auto;
}
.pd-editorial-inner {
  font-size: 110%;
  font-weight: 400;
  max-width: 45rem;
  line-height: 1.6;
  margin: 0 auto;
  text-align: left;
}
@media screen and (min-width: 768px) {
  .pd-editorial-inner { text-align: justify; }
  .pd-white-section .pd-editorial-inner { text-align: justify; }
}
.pd-editorial-section h2 {
  font-size: 180%; font-weight: 500; text-align: center;
  margin-top: 20px; margin-bottom: 20px; line-height: 1.2;
}
.pd-editorial-section h3 {
  font-size: 130%; font-weight: 500;
  margin-top: 30px; margin-bottom: 10px;
}
.pd-editorial-section p {
  margin-bottom: 16px;
}
.pd-editorial-section strong { font-weight: 700; }
.pd-editorial-section em { font-style: italic; }
.pd-editorial-section ul {
  margin-bottom: 30px; padding-left: 20px;
}
.pd-editorial-section li { margin-bottom: 4px; }
.pd-editorial-section .list-subtitle {
  font-weight: 600; color: #0aa6c9;
  margin-top: 20px; margin-bottom: 10px; display: block;
}
.pd-editorial-section .closing {
  font-size: 100%; font-weight: 500; max-width: 40rem;
  margin: 40px auto 0 auto; text-align: center;
  border-top: 1px solid #ddd; padding-top: 20px;
}
.pd-editorial-section .blockquote {
  border-left: 3px solid var(--teal);
  padding: 16px 24px; margin: 24px 0;
  background: rgba(91,154,154,.06);
}
.pd-editorial-section .blockquote p { margin-bottom: 10px; }

/* -- White section (alternating) -- */
.pd-white-section {
  background: var(--bg); padding: 60px 20px;
}
.pd-white-section .pd-editorial-inner {
  font-size: 110%; font-weight: 400;
  max-width: 45rem; line-height: 1.6;
  margin: 0 auto; text-align: left;
}
.pd-white-section h2 {
  font-size: 180%; font-weight: 500; text-align: center;
  line-height: 1.2; margin-bottom: 20px;
}
.pd-white-section h3 {
  font-size: 130%; font-weight: 500;
  margin-top: 30px; margin-bottom: 10px;
}
.pd-white-section p { margin-bottom: 16px; }
.pd-white-section strong { font-weight: 700; }
.pd-white-section ul { margin-bottom: 30px; padding-left: 20px; }
.pd-white-section li { margin-bottom: 4px; }
.pd-white-section .list-subtitle {
  font-weight: 600; color: #0aa6c9;
  margin-top: 20px; margin-bottom: 10px; display: block;
}
.pd-white-section .closing {
  font-size: 100%; font-weight: 500; max-width: 40rem;
  margin: 40px auto 0; text-align: center;
  border-top: 1px solid #ddd; padding-top: 20px;
}
.pd-white-section .blockquote {
  border-left: 3px solid var(--teal);
  padding: 16px 24px; margin: 24px 0;
}

/* -- Conseils d'utilisation -- */
.pd-usage {
  background: var(--bg-light);
  padding: 50px 20px;
  text-align: center;
}
.pd-usage h2 {
  font-size: 22px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 2px; margin-bottom: 30px;
}
.pd-usage-grid {
  display: flex; justify-content: center; gap: 60px;
  margin-bottom: 30px; flex-wrap: wrap;
}
.pd-usage-item { text-align: center; max-width: 220px; }
.pd-usage-item .usage-icon { width: 200px; height: auto; margin-bottom: 12px; }
.pd-usage-item p { font-size: 16px; font-weight: 700; }
.pd-disclaimer {
  font-size: 12px; color: var(--text-light); line-height: 1.7;
  max-width: 700px; margin: 0 auto; text-align: center;
}
.pd-disclaimer strong { font-weight: 700; color: var(--text); }

/* -- Ingredients grid -- */
.pd-ings {
  padding: 50px 20px;
  background: var(--bg);
}
.pd-ings h2 {
  font-size: 22px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 2px; text-align: center; margin-bottom: 40px;
}
.pd-ings-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 40px 30px;
  max-width: 900px;
  margin: 0 auto;
}
.pd-ing-card { text-align: center; }
.pd-ing-card img {
  width: 180px; height: 180px;
  border-radius: 50%; object-fit: cover;
  display: block; margin: 0 auto 14px;
}
.pd-ing-card h4 { font-size: 17px; font-weight: 700; margin-bottom: 10px; }
.pd-ing-card p { font-size: 13px; color: var(--text-light); line-height: 1.6; max-width: 280px; margin: 0 auto; }

/* -- FAQ -- */
.pd-faq {
  padding: 50px 20px;
  background: var(--bg);
}
.pd-faq h2 {
  font-size: 22px; font-weight: 400; text-align: center;
  margin-bottom: 30px; line-height: 1.4;
}
.pd-faq-inner { max-width: 700px; margin: 0 auto; }
.faq-item { border-top: 1px solid var(--border); }
.faq-item:last-child { border-bottom: 1px solid var(--border); }
.faq-q {
  width: 100%; display: flex; align-items: center;
  justify-content: space-between; padding: 20px 0;
  background: none; cursor: pointer; border: none;
  font-family: inherit; text-align: left;
}
.faq-q h4 {
  font-size: 17px; font-weight: 600; color: var(--text);
  flex: 1; padding-right: 20px; line-height: 1.4;
}
.faq-q .toggle {
  font-size: 22px; color: var(--text); font-weight: 300;
  flex-shrink: 0; width: 24px; text-align: center;
  transition: transform .2s;
}
.faq-a {
  display: none; padding: 0 0 20px;
  font-size: 14px; line-height: 1.8; color: var(--text-light);
}
.faq-a.open { display: block; }
.faq-a strong { color: var(--text); font-weight: 700; }
.faq-a ul { margin: 8px 0 8px 24px; }

/* ============================================= */
/* MOBILE: stack hero vertically                 */
/* ============================================= */
@media (max-width: 768px) {
  .pd-hero { flex-direction: column; gap: 16px; padding: 0 16px 20px; }
  .pd-gallery { flex: none; }
  .pd-gallery-wrap { flex-direction: column-reverse; }
  .pd-thumbs-col { flex-direction: row; width: auto; overflow-x: auto; }
  .pd-thumb { width: 56px; height: 56px; flex-shrink: 0; }
  .pd-title { font-size: 22px; }
  .pd-ings-grid { grid-template-columns: repeat(2, 1fr); gap: 30px 20px; }
  .pd-ing-card img { width: 130px; height: 130px; }
  .pd-editorial-section h2, .pd-white-section h2 { font-size: 150%; }
  .pd-usage-grid { gap: 30px; }
  .pgrid { gap: 12px; }
}

/* ============================================= */
/* GUIDE / COMBOS / SEARCH                       */
/* ============================================= */
.gpage { padding: 30px 20px 50px; max-width: 700px; margin: 0 auto; }
.glabel { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: var(--teal); font-weight: 700; margin-bottom: 10px; }
.gtitle { font-size: 24px; font-weight: 700; color: var(--text); line-height: 1.35; }
.gsub { font-size: 14px; color: var(--text-light); margin-top: 6px; }
.gdiv { width: 40px; height: 2px; background: var(--teal); margin: 20px 0; }
.gopts { display: flex; flex-direction: column; gap: 8px; }
.gbtn {
  width: 100%; text-align: left; padding: 16px 20px;
  background: var(--bg); border: 1px solid var(--border); border-radius: 0;
  cursor: pointer; display: flex; align-items: center;
  justify-content: space-between; font-family: inherit; transition: all .2s;
}
.gbtn:hover { border-color: var(--teal); }
.gbtn .gl { font-size: 15px; color: var(--text); }
.gbtn:hover .gl { color: var(--teal); }
.gbtn .ga { color: #ccc; }
.gbtn:hover .ga { color: var(--teal); }
.gback { margin-top: 20px; background: none; border: none; color: var(--text-muted); font-size: 13px; cursor: pointer; font-family: inherit; }
.gback:hover { color: var(--teal); }
.greset { font-size: 11px; background: none; color: var(--teal); border: 1px solid var(--teal); padding: 6px 14px; cursor: pointer; font-family: inherit; margin-bottom: 16px; }
.greset:hover { background: var(--teal); color: #fff; }

/* Reco */
.reco-badge { display: inline-flex; align-items: center; gap: 6px; background: #eef5f0; color: #4a7c59; font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 5px 12px; margin-bottom: 12px; }
.reco-badge .dot { width: 6px; height: 6px; background: #4a7c59; border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
.reco-header { display: flex; align-items: flex-end; gap: 16px; margin-bottom: 12px; }
.reco-header-text { flex: 1; }
.reco-thumb { width: 100px; height: 100px; object-fit: contain; flex-shrink: 0; }
.voir-fiche-link { display: inline-block; margin-top: 6px; color: var(--accent); font-size: 13px; font-weight: 600; text-decoration: none; cursor: pointer; }
.voir-fiche-link:hover { text-decoration: underline; }
.voir-fiche-link.voir-fiche-sm { font-size: 12px; margin-top: 4px; color: #4a9bb0; }
.comp-row { display: flex; align-items: center; gap: 12px; width: 100%; }
.comp-thumb { width: 64px; height: 64px; object-fit: contain; flex-shrink: 0; border-radius: 8px; }
.comp-info { flex: 1; }
.rprod { font-size: 24px; font-weight: 700; }
.rref { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
.rcard { background: var(--bg-light); border-left: 4px solid var(--teal); padding: 20px; margin-top: 14px; }
.rcard .rl { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); font-weight: 700; margin-bottom: 8px; }
.rcard .rt { font-size: 14px; line-height: 1.7; }
.rdose { margin-top: 14px; background: var(--bg); border: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; gap: 12px; }
.rdose .ri { font-size: 20px; } .rdose .rdl { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); font-weight: 600; } .rdose .rdv { font-size: 14px; font-weight: 600; }
.icard { border: 1px solid var(--border); padding: 14px 16px; margin-top: 8px; display: flex; align-items: flex-start; gap: 12px; }
.icard-c { background: #edf2f7; border-color: #d5dfe8; } .icard-u { background: #faf5ed; border-color: #ede5d8; }
.icard-leg { background: #fef9ee; border-color: #f0e6cc; } .il-leg { color: #b8860b; } .it-leg { font-size: 12px; color: #666; line-height: 1.5; }
.icard .ii { font-size: 16px; flex-shrink: 0; } .icard .il { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; margin-bottom: 3px; }
.il-c { color: #4a6a8c; } .il-u { color: #8c6d3f; }
.icard .it { font-size: 13px; line-height: 1.5; } .icard .ir { font-size: 10px; color: var(--text-muted); margin-top: 2px; }

/* Combos */
.cpage { padding: 30px 20px; max-width: 700px; margin: 0 auto; }
.cpage h2 { font-size: 22px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; text-align: center; margin-bottom: 20px; }
.ccard { border-bottom: 1px solid var(--border); padding: 16px 0; }
.ccard:first-of-type { border-top: 1px solid var(--border); }
.ccard h3 { font-size: 17px; font-weight: 700; }
.ccard .ct { font-size: 13px; color: var(--text-light); margin-top: 2px; }
.ccard .cp { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.cpill { font-size: 11px; font-weight: 600; padding: 4px 12px; border-radius: 2px; background: var(--bg-light); border: 1px solid var(--border); color: var(--text); }

/* Search */
.spage { padding: 30px 20px; max-width: 700px; margin: 0 auto; }
.spage h2 { font-size: 22px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; text-align: center; margin-bottom: 20px; }
.sinput { width: 100%; padding: 12px 16px; font-size: 15px; border: 1px solid var(--border); font-family: inherit; outline: none; margin-bottom: 20px; }
.sinput:focus { border-color: var(--teal); }
.sr { border-bottom: 1px solid var(--border); padding: 14px 0; }
.sr:first-of-type { border-top: 1px solid var(--border); }
.sr h4 { font-size: 15px; font-weight: 700; }
.sr p { font-size: 13px; color: var(--text-light); margin-top: 2px; }
.stag { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; background: var(--bg-light); border: 1px solid var(--border); margin: 4px 4px 0 0; }

@media (min-width: 700px) { .pgrid { grid-template-columns: repeat(3, 1fr); } }

/* ============================================= */
/* EDIT MODE                                     */
/* ============================================= */
.edit-toggle {
  position: fixed; top: 12px; right: 16px; z-index: 300;
  background: #fff; border: 2px solid var(--border); border-radius: 6px;
  padding: 6px 14px; font-family: 'Raleway', sans-serif; font-size: 12px;
  font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px;
  box-shadow: 0 2px 8px rgba(0,0,0,.1); transition: all .2s;
}
.edit-toggle:hover { border-color: var(--teal); color: var(--teal); }
.edit-toggle.active { background: var(--teal); color: #fff; border-color: var(--teal); }

.eblock { position: relative; transition: outline .2s; }
body.editing .eblock { outline: 1px dashed rgba(91,154,154,.35); outline-offset: 4px; cursor: pointer; }
body.editing .eblock:hover { outline-color: var(--teal); }

.ebtn {
  display: none; position: absolute; top: 4px; right: 4px; z-index: 50;
  background: var(--teal); color: #fff; border: none; border-radius: 4px;
  width: 28px; height: 28px; font-size: 14px; cursor: pointer;
  align-items: center; justify-content: center; box-shadow: 0 1px 4px rgba(0,0,0,.2);
}
body.editing .ebtn { display: flex; }
.ebtn:hover { background: var(--teal-dark); }

/* Modal */
.emodal-overlay {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.5); align-items: center; justify-content: center;
  padding: 20px;
}
.emodal-overlay.open { display: flex; }
.emodal {
  background: #fff; border-radius: 8px; width: 100%; max-width: 800px;
  max-height: 85vh; display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,.3);
}
.emodal-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
}
.emodal-hdr h3 { font-size: 15px; font-weight: 700; }
.emodal-hdr .eclose {
  background: none; border: none; font-size: 22px; cursor: pointer;
  color: var(--text-muted); padding: 0 4px;
}
.emodal-hdr .eclose:hover { color: var(--text); }
.emodal-body { flex: 1; overflow: auto; padding: 16px 20px; }
.emodal-body textarea {
  width: 100%; min-height: 300px; font-family: 'Raleway', sans-serif;
  font-size: 14px; line-height: 1.6; border: 1px solid var(--border);
  padding: 14px; resize: vertical; outline: none; tab-size: 2;
  white-space: pre-wrap;
}
.emodal-body textarea:focus { border-color: var(--teal); }
.etoolbar {
  display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px;
  padding: 6px 0; border-bottom: 1px solid var(--border);
}
.etoolbar button {
  background: var(--bg-light); border: 1px solid var(--border); border-radius: 4px;
  padding: 4px 10px; font-family: 'Raleway', sans-serif; font-size: 12px;
  cursor: pointer; color: var(--text); transition: all .15s;
}
.etoolbar button:hover { background: var(--teal); color: #fff; border-color: var(--teal); }
.etsep { width: 1px; background: var(--border); margin: 0 4px; }
.epreview-label {

// ---- EDIT MODE ---- //
let editMode=false, currentRef=null, currentField=null;
const OV={}; // overrides
const VALS={}; // raw values cache: VALS["LabL001.editorialContent"] = "<p>..."

function gv(ref,field,def){
  if(OV[ref]&&OV[ref][field]!==undefined) return OV[ref][field];
  return def;
}

// Store raw value + render editable block
function eb(field,label,html,rawVal){
  const val=rawVal!==undefined?rawVal:html;
  VALS[currentRef+'.'+field]=val;
  return '<div class="eblock" data-field="'+field+'" data-label="'+esc(label)+'" onclick="openEdit(this)">'+
    '<button class="ebtn" onclick="event.stopPropagation();openEdit(this.parentElement)">✏️</button>'+
    html+'</div>';
}

function toggleEdit(){
  editMode=!editMode;
  document.body.classList.toggle('editing',editMode);
  document.getElementById('editToggle').classList.toggle('active',editMode);
  document.getElementById('editToggle').innerHTML=editMode?'✓ Terminer':'✏️ Éditer';
}

function openEdit(block){
  if(!editMode||!currentRef) return;
  currentField=block.dataset.field;
  const label=block.dataset.label;
  const key=currentRef+'.'+currentField;
  const val=VALS[key]||'';

  document.getElementById('editModalTitle').textContent='Éditer : '+label;
  document.getElementById('editTA').value=val;
  updatePreview();
  document.getElementById('editModal').classList.add('open');
  setTimeout(()=>document.getElementById('editTA').focus(),100);
}

function closeEdit(){
  document.getElementById('editModal').classList.remove('open');
  currentField=null;
}

function updatePreview(){
  document.getElementById('editPreview').innerHTML=document.getElementById('editTA').value;
}

function saveEdit(){
  if(!currentRef||!currentField) return;
  const val=document.getElementById('editTA').value;
  if(!OV[currentRef]) OV[currentRef]={};
  OV[currentRef][currentField]=val;
  VALS[currentRef+'.'+currentField]=val;
  closeEdit();
  showPD(currentRef);
}

function insertTag(tag){
  const ta=document.getElementById('editTA');
  const s=ta.selectionStart,e=ta.selectionEnd,sel=ta.value.substring(s,e);
  const o='<'+tag+'>',c='</'+tag+'>';
  ta.value=ta.value.substring(0,s)+o+sel+c+ta.value.substring(e);
  ta.focus();ta.selectionStart=s+o.length;ta.selectionEnd=s+o.length+sel.length;
  updatePreview();
}
function insertWrap(o,c){
  const ta=document.getElementById('editTA');
  const s=ta.selectionStart,e=ta.selectionEnd,sel=ta.value.substring(s,e);
  c=c||'';
  ta.value=ta.value.substring(0,s)+o+sel+c+ta.value.substring(e);
  ta.focus();ta.selectionStart=s+o.length;ta.selectionEnd=s+o.length+sel.length;
  updatePreview();
}
function insertInside(o,c){
  const ta=document.getElementById('editTA');const p=ta.selectionStart;
  ta.value=ta.value.substring(0,p)+o+c+ta.value.substring(p);
  ta.focus();ta.selectionStart=ta.selectionEnd=p+o.length;updatePreview();
}

function exportData(){
  const json=JSON.stringify({products:P,overrides:OV},null,2);
  navigator.clipboard.writeText(json).then(()=>alert('JSON copié !')).catch(()=>{
    const t=document.createElement('textarea');t.value=json;document.body.appendChild(t);t.select();
    document.execCommand('copy');document.body.removeChild(t);alert('JSON copié !');
  });
}
function downloadData(){
  const json=JSON.stringify({products:P,overrides:OV},null,2);
  const blob=new Blob([json],{type:'application/json'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='labl-produits-data.json';a.click();URL.revokeObjectURL(url);
}
function importData(){document.getElementById('importInput').click();}
function handleImport(e){
  const file=e.target.files[0];if(!file) return;
  const r=new FileReader();
  r.onload=function(ev){
    try{const d=JSON.parse(ev.target.result);
      if(d.products)Object.assign(P,d.products);if(d.overrides)Object.assign(OV,d.overrides);
      alert('Données importées !');if(currentRef&&P[currentRef])showPD(currentRef);else renderList();
    }catch(err){alert('Erreur: '+err.message);}
  };r.readAsText(file);e.target.value='';
}

    h+='<div class="rcard"><div class="rl">Pourquoi ce produit</div><div class="rt">'+esc(n.why)+'</div>';
    h+='<div class="rdose"><span class="ri">💊</span><div><div class="rdl">Posologie</div><div class="rdv">'+esc(n.dose)+'</div></div></div></div>';
    if(n.conseils){h+='<div class="icard icard-leg"><span class="ii">⚠️</span><div><div class="il il-leg">Conseils d\'utilisation</div><div class="it it-leg">'+esc(n.conseils)+'</div></div></div>';}
    if(n.complement){
      var cRefRaw=n.complementRef||n.complement||'';
      var cRefRes=resolveRef(cRefRaw);
      var cImg=(cRefRes&&(VIMG[cRefRes]||(P[cRefRes]&&P[cRefRes].images[0])))||'';
      h+='<div class="icard icard-c"><div class="comp-row">';
      if(cImg){var cfb=cRefRes&&P[cRefRes]?P[cRefRes].images[0]:'';h+='<img class="comp-thumb" src="'+cImg+'" alt=""'+(cfb?' onerror="this.onerror=null;this.src=\''+cfb.replace(/'/g,"\\'")+'\';"':'')+'>'; }
      h+='<div class="comp-info"><div class="il il-c">➕ Complément recommandé</div><div class="it">'+esc(n.complement)+'</div>';
      if(cRefRes)h+='<div class="ir">'+esc(PN[cRefRes]||cRefRes)+'</div>';
      if(cRefRes&&P[cRefRes]){h+='<a class="voir-fiche-link voir-fiche-sm" href="#" onclick="event.preventDefault();guideViewPD(\''+cRefRes+'\')">→ Voir la fiche</a>';}
      h+='</div></div></div>';
    }
    if(n.upsell){h+='<div class="icard icard-u"><span class="ii">💡</span><div><div class="il il-u">Astuce</div><div class="it">'+esc(n.upsell)+'</div></div></div>';}
  }
  if(d>0)h+='<button class="gback" onclick="gp.pop();renderGuide();">← Précédent</button>';
  h+='</div>';el.innerHTML=h;
}
function renderCombos(){
  const el=document.getElementById('page-combos');
  let h='<div class="cpage"><h2>Combos Gagnants</h2>';
  combos.forEach(c=>{h+='<div class="ccard"><h3>'+esc(c.name)+'</h3><div class="ct">'+esc(c.target)+'</div><div class="cp">';c.products.forEach(r=>{h+='<span class="cpill">'+esc(PN[r]||r)+'</span>';});h+='</div></div>';});
  h+='</div>';el.innerHTML=h;
}
function renderSearch(q){
  q=(q||'').toLowerCase();
  const el=document.getElementById('page-search');
  let h='<div class="spage"><h2>Recherche par Ingrédient</h2>';
  h+='<input class="sinput" placeholder="Ex : Rhodiola, Zinc, Biotine..." value="'+esc(q)+'" oninput="renderSearch(this.value)">';
  const f=q?IDB.filter(i=>i.name.toLowerCase().includes(q)||i.desc.toLowerCase().includes(q)):IDB;
  f.forEach(i=>{h+='<div class="sr"><h4>'+esc(i.name)+'</h4><p>'+esc(i.desc)+'</p><div>';i.products.forEach(r=>{h+='<span class="stag">'+esc(PN[r]||r)+'</span>';});h+='</div></div>';});
  if(!f.length)h+='<p style="text-align:center;color:#999;padding:40px">Aucun résultat</p>';
  h+='</div>';el.innerHTML=h;
  if(q){const inp=el.querySelector('.sinput');if(inp){inp.focus();inp.setSelectionRange(q.length,q.length);}}
}

renderList();
</script>
